image: map.png #relative path from yaml file to png file
mode: trinary
resolution: 0.05 # resolution (meters per pixels) - corresponds to 1/map_conversion (not including meters_to_pixels)
origin: [-15.24, -12.192, 0] # (x,y,yaw) origin of robot start position relative to lower left corner... not (80,40)
negate: 0 #if set to 1, then free and occupied space will be inverted
                    # thresh = probability about whether an obstacle is there or not
occupied_thresh: 0.65 # if probability greater than occupied_thresh ->> occupied
free_thresh: 0.25 # if probability less than free_thresh ->> free