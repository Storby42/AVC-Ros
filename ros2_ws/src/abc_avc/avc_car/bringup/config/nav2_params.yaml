# 1. PARAMETERS FOR PATH CREATION

controller_server:
  ros__parameters:
    controller_frequency: 20.0 # how frequently controller sends commands (Hz) to /cmd_vel
    min_x_velocity_threshold: 0.001 # prevents noise (ignores too small of velocities, sets to 0 instead)
    min_y_velocity_threshold: 0.001 # prevents noisse (ignores too small of velocities sets to 0 instead)
    min_theta_velocity_threshold: 0.001 # prevents noise (ignores too small of velocities sets to 0 instead)
    progress_check_plugin: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]  
    # speed_limit_topic: "/speed_limit"

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
      # minimum amount of movement the robot must undergo in a certain time to be counted as progressing
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.3 # meters
      yaw_goal_tolerance: 0.75 # radians
      path_length_tolerance: 0.4 # meters
      stateful: True # 
    FollowPath:
       # CHANGED from regulated pure persuit controller -> to vector persuit controller
        plugin: "vector_pursuit_controller::VectorPursuitController"
        k: 10.0 # rotation_time = k * translation_time, relates how much you fast you can turn to the translational (forward) movement
        desired_linear_vel: 0.6 # target linear velocity
        min_turning_radius: 0.7 # should be less than planner min turning radius (so you don't get stuck in a loop)
        
        use_rotate_to_heading: false # if the current heading =/= path heading, turn to the path heading 
                                     # by moving in place (i.e. NOT moving forward/using a curved arc)
                                     # BUT you can't do this with ackermann/bicycle
        allow_reversing: true
        
        transform_tolerance: 0.1 # if the transforms aren't being sent at this minimum tolerance, stop the robot (ensure not using outdated sensor data) 
        use_velocity_scaled_lookahead_dist: true # scales lookahead distance proportional to velocity
                                                 # if high velocity -> longer lookahead, if low velocity -> shorter lookahead
        lookahead_dist: 1.0
        min_lookahead_dist: 0.5
        max_lookahead_dist: 1.5
        lookahead_time: 1.5

        min_linear_velocity: 0.0
        # when the car starts to approach a goal (within scaling_dist), start slowing down
        # BUT don't slow down too soon, or else the car may stop too soon 
        min_approach_linear_velocity: 0.05
        approach_velocity_scaling_dist: 0.5

        max_allowed_time_to_collision_up_to_target: 1.0 # max time in which velocity is projected forward to check for potential collisions
                                                        # -> if there's collisions, slow down (in order to allow more time for path plan change?)
        use_collision_detection: true
        
        use_cost_regulated_linear_velocity_scaling: true # slows down velocity if close to obstacles in cost map
        cost_scaling_dist: 0.5 # how for away from the obstacle the velocity-slow-down should begin
        cost_scaling_gain: 1.0 # factor to slow the velocity
        inflation_cost_scaling_factor: 3.0 # factor to scale the inflation cost
        
        max_angular_accel: 3.0
        max_linear_accel: 2.0
        max_lateral_accel: 0.2 # used to slow down the robot during sharp turns; higher values -> higher linear velocity during turn
        max_robot_pose_search_dist: 10.0 # how far controller searches for goals

        use_interpolation: true # basically interpolates between waypoints -> more precise path
        use_heading_from_path: true # set to true because we're using the smac path planner
                                    # and the smac path planner knows we're using an ackermann/bicycle type car
                                    # so the heading will be the correct orientation based on the car and ready to complete next maneuvers
# 2. PARAMETERS FOR COSTMAP

map_server:
  ros__parameters:
    use_sim_time: True #TODO: change to false
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: "" # TODO ^^ so we dont have to say the map every time? ????? 
    save_map_timeout: 5.0 # TODO: idk if this is necessary ..., time before timeout?
    map_subscribe_transient_local: True

# local costmap is the area around the robot (based on odom) in order to avoid obstacles
# still uses global map to correct for absolute position 
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0 
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true # if the costmap moves along with the robot
      
      # dimnesions of the costmap itself (meters)
      width: 3
      height: 3
      resolution: 0.05 # meters per cell

      # size of robot relative to base_link, defined by 2D points
      footprint: "[ [0.381, 0.436], [0.381, -0.436], [-0.381, -0.436], [-0.381, 0.436] ]"
      footprint_padding: 0.01 # default
      
      # NOT using voxel_layer because we don't really need height; the height of the obstacles won't affect costmap, and the obstacles are static
      # NOT using static_layer because this is a rolling window, and a static map wouldn't work
      plugins: ["inflation_layer"]

      # inflation layer creates the "cost" in the costmap
      # aka the cyan
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.0 # decay factor across inflation radius
        inflation_radius: 0.6 # radius to inflate costmap around lethal obstacles
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      
      # size of robot relative to base_link, defined by 2D points
      footprint: "[ [0.381, 0.436], [0.381, -0.436], [-0.381, -0.436], [-0.381, 0.436] ]"
      footprint_padding: 0.01 # default

      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]

      # static layer creates the static "map" in the costmap
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      
      # inflation layer creates the "cost" in the costmap
      # blue
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: .5
        inflation_radius: 0.6
      always_send_full_costmap: True

# 3. PARAMETERS FOR PATH MAP + SMOOTHING PATH

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    use_sim_time: False

    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid" 
      downsample_costmap: false  # DOESN'T downsample entire map -> more accurate (uses full resolution) but more processing power     
      downsampling_factor: 1     # if we want to downsample, the factor to divide resolution        
      tolerance: 0.27 # tolerance from requested goalpoint (e.g. if exact path can't be found)
      allow_unknown: true # allows planner to plan in places marked "unknown"
      max_iterations: 1000000             # max number of search iterations
      max_on_approach_iterations: 1000    # number of iterations where: once robot within tolerance, try to align exactly at goal
      max_planning_time: 5.0              # max planning time (seconds)
      motion_model_for_search: "DUBIN"    # default for Hybrid-A* 
      angle_quantization_bins: 72         # divides 360 degrees into # bins to find heading
      analytic_expansion_ratio: 3.5       # how often planner tries to use easier path instead of planner with complicated nodes (e.g. when in open space)  
      analytic_expansion_max_length: 3.0  # max length allowed for rejection (so don't accidentally shortcut directly into a goal)
                                          # should always be >4-5 times max turning radius or else huge planning times
      analytic_expansion_max_cost: 200.0  # doesn't allow shortcut into high cost
      analytic_expansion_max_cost_override: false # ^ is strictly enforced (if true, can override)
      minimum_turning_radius: 1.0 # a bit larger than actual min turning error
      reverse_penalty: 2.0                
      change_penalty: 1.0              
      non_straight_penalty: 1.0
      cost_penalty: 1.3              # cost multiplier
      retrospective_penalty: 0.005  # prefer later manuever vs earlier (less search time)
      lookup_table_size: 20.0             # how far planner can plan
      cache_obstacle_heuristic: false #    planner recalculates distance from obstacles every time (but slower)
      debug_visualizations: false         # publishing to rviz
      use_quadratic_cost_penalty: False   # doesn't allow quadratic (better path), false -> more senstive to obstacles
      downsample_obstacle_heuristic: True # allows downsampling for costmap -> quickly planning times but may path closer to obstacles
      allow_primitive_interpolation: False # doesn't allow using stuff other than standardprimitives (left, right, straight, etc.)
      smooth_path: True                    # connects to "smoother" below
      
      # first path smoother, automatically runs, fast
      smoother:
        max_iterations: 1000
        w_smooth: 0.3       # how smooth to make the path, higher = smoother but might cut into obstacles 
        w_data: 0.2         # how close to original path to stick to
        tolerance: 1.0e-10  # if change between iterations smaller than tolerance, stop iterating
        do_refinement: true
        refinement_num: 2   # extra refinement pass

# more explicit smoother, more complex
# TODO: IF THE PATH IS ZIGZAGGY:: change smoother stuff
smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: global_costmap/costmap_raw # CHANGED from local to global because otherwise could bump into obstacles 
    footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false # if fail, go to next waypoint
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

# smooths inputs in order not to kill motors
velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    odom_topic: "odometry/local" # used if close loop
    max_velocity: [3.2, 0.0, 7.0] # x, y, yaw
    min_velocity: [-3.2, 0.0, -7.0]
    max_accel: [2.5, 0.0, 3.2] # x, y, yaw 
    max_decel: [-2.5, 0.0, -3.2]
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
