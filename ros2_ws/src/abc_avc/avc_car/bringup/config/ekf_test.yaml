### ekf (LOCAL extended kalman filter for robot_localization, for odom -> base_link) config file ###
ekf_filter_node_local:
    ros__parameters:
 
# The frequency, in Hz, at which the filter will output a position estimate.
        frequency: 20.0
 
# if true, no 3D information will be used in your state estimate (ignore small z changes, e.g. by IMU)
# used if in a planar environment (which we are except for the ramp)
        two_d_mode: true #TODO: how to deal with ramp
 
# Whether to broadcast the transformation over the /tf topic (we want this because of nav2)
        publish_tf: true
 
# odom frame will drift over time, but is accurate in the short term and should be CONTINUOUS.
# The map frame contains the most globally accurate position estimate BUT is subject to discrete JUMPS

# If world_frame:odom [local ekf] ->> We get odom -> base_link transform
# If world_frame:map [global ekf] ->> We get map -> odom transform
        map_frame: map               
        odom_frame: odom               
        base_link_frame: base_link # Defaults to "base_link" if unspecified
        world_frame: odom                # (odom if continuous, map if jumpy)
 
# filter accepts an arbitrary number of inputs # we're using nav_msgs/Odometry,geometry_msgs/PoseWithCovarianceStamped
# to add an input, just add a # to the "base" name, e.g. odom0, odom1, twist0, twist1
# this declares odom0 as the odometry estimate from IMU+encoder
        pose0: pose_cov # TODO: replace with whatever node/topic we're using for odometry, The odom message from the pico is actually a pose message, so ???
                                             # this is a nav_msgs/Odometry topic 
 
# options for which measurements are used in the filter (if true, it is used; if false, it is not used)
# our odometry estimate calculates x_pos and y_pos and yaw, so we set those to true
        pose0_config: [true, true, false,
                       false, false, true,
                       false, false, false,
                       false, false, false,
                       false, false, false]
 
        #        [x_pos   , y_pos    , z_pos,
        #         roll    , pitch    , yaw,
        #         x_vel   , y_vel    , z_vel,
        #         roll_vel, pitch_vel, yaw_vel,
        #         x_accel , y_accel  , z_accel]

### ekf (GLOBAL extended kalman filter for robot_localization, for map -> odom) config file ###
ekf_filter_node_global:
    ros__parameters:
 
# The frequency, in Hz, at which the filter will output a position estimate.
        frequency: 20.0
 
# if true, no 3D information will be used in your state estimate (ignore small z changes, e.g. by IMU)
# used if in a planar environment (which we are except for the ramp)
        two_d_mode: true #TODO: how to deal with ramp
 
# Whether to broadcast the transformation over the /tf topic (we want this because of nav2)
        publish_tf: true
 
# odom frame will drift over time, but is accurate in the short term and should be CONTINUOUS.
# The map frame contains the most globally accurate position estimate BUT is subject to discrete JUMPS

# If world_frame:odom [local ekf] ->> We get odom -> base_link transform
# If world_frame:map [global ekf] ->> We get map -> odom transform
        map_frame: map               
        odom_frame: odom               
        base_link_frame: base_link  # Defaults to "base_link" if unspecified
        world_frame: map                # (odom if continuous, map if jumpy)
 
# filter accepts an arbitrary number of inputs # we're using nav_msgs/Odometry,geometry_msgs/PoseWithCovarianceStamped
# to add an input, just add a # to the "base" name, e.g. odom0, odom1, twist0, twist1
# this declares odom0 as the odometry estimate from IMU+encoder
        pose0: pose_cov # TODO: replace with whatever node/topic we're using for odometry
                                             # this is a nav_msgs/Odometry topic
 
# options for which measurements are used in the filter (if true, it is used; if false, it is not used)
# our odometry estimate calculates x_pos and y_pos and yaw, so we set those to true
        pose0_config: [true, true, false,
                       false, false, false,
                       false, false, false,
                       false, false, false,
                       false, false, false]
        pose0_differential: true
 
        #        [x_pos   , y_pos    , z_pos,
        #         roll    , pitch    , yaw,
        #         x_vel   , y_vel    , z_vel,
        #         roll_vel, pitch_vel, yaw_vel,
        #         x_accel , y_accel  , z_accel]

# this declares odom0 as the odometry estimate from IMU+encoder
        pose1: buckalization #TODO: replace with whatever node/topic we're using for vision odometry
                                              # this is a geometry_msgs/PoseWithCovarianceStamped topic
 
# options for which measurements are used in the filter (if true, it is used; if false, it is not used)
# our odometry estimate calculates x_pos and y_pos and yaw, so we set those to true
        pose1_config: [true, true, false,
                       false, false, true,
                       false, false, false,
                       false, false, false,
                       false, false, false]
 
        #        [x_pos   , y_pos    , z_pos,
        #         roll    , pitch    , yaw,
        #         x_vel   , y_vel    , z_vel,
        #         roll_vel, pitch_vel, yaw_vel,
        #         x_accel , y_accel  , z_accel]
